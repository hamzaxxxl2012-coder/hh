<!-- حاوية الصور والمودال -->
<div class="container mt-4">
      <h2 class="text-center mb-4">وحدات الحمام</h2>
    <!-- شبكة الصور (التي ستظهر فيها الصور من 100 إلى 127) -->
    <div class="row g-3" id="galleryContainer"></div>

    <!-- نافذة التكبير (Modal) -->
    <div class="modal fade" id="imgModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content bg-dark border-0">
                <div class="modal-body p-0 d-flex align-items-center justify-content-between">
                    <!-- سهم اليسار -->
                    <button class="btn text-white fs-1 px-4" onclick="moveImg(-1)" style="z-index: 10; border: none;">❮</button>
                    
                    <div class="position-relative w-100 text-center">
                        <button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-3" data-bs-dismiss="modal"></button>
                        <img src="" id="displayImg" class="img-fluid rounded shadow">
                    </div>

                    <!-- سهم اليمين -->
                    <button class="btn text-white fs-1 px-4" onclick="moveImg(1)" style="z-index: 10; border: none;">❯</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const startNum = 100; // بداية الأرقام
    const endNum = 127;   // نهاية الأرقام
    const container = document.getElementById('galleryContainer');
    const displayImg = document.getElementById('displayImg');
    let currentIdx = startNum;

    // 1. إنشاء الصور من رقم 100 إلى 127 تلقائياً
    let galleryHTML = '';
    for (let i = startNum; i <= endNum; i++) {
        galleryHTML += `
            <div class="col-6 col-md-3">
                <img src="${i}.jpeg" class="img-fluid rounded border shadow-sm" 
                     style="cursor:pointer; height:200px; object-fit:cover; width:100%"
                     data-bs-toggle="modal" data-bs-target="#imgModal" 
                     onclick="setImg(${i})">
            </div>`;
    }
    container.innerHTML = galleryHTML;

    // 2. وظيفة التكبير (تحديد الصورة المختارة)
    function setImg(n) {
        currentIdx = n;
        displayImg.src = n + ".jpeg";
    }

    // 3. وظيفة الأسهم (للتنقل بين الصور 100 و 127)
    function moveImg(step) {
        currentIdx += step;
        if (currentIdx > endNum) currentIdx = startNum; // إذا وصل لآخر صورة يرجع لـ 100
        if (currentIdx < startNum) currentIdx = endNum; // إذا رجع من أول صورة يذهب لـ 127
        displayImg.src = currentIdx + ".jpeg";
    }

    // دعم التنقل عبر أسهم الكيبورد
    document.addEventListener('keydown', (e) => {
        if (e.key === "ArrowLeft") moveImg(-1);
        if (e.key === "ArrowRight") moveImg(1);
    });
</script>
    
    <!-- Modal تكبير الصورة -->
    <div class="modal fade" id="imageModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">
    <div class="modal-body p-0">
    <img id="modalImage" src="" class="img-fluid w-100">
    </div>
    </div>
    </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- JavaScript -->
    <script>
    function showImage(src) {
    document.getElementById("modalImage").src = src;
    }
    </script>
