<!-- حاوية الصور والمودال -->
<div class="container mt-4">
        <h2 class="text-center mb-4">معرض الشبابيك</h2>
    <!-- شبكة الصور (تظهر الصور من 128 إلى 157) -->
    <div class="row g-3" id="gallery128to157"></div>

    <!-- نافذة التكبير (Modal) -->
    <div class="modal fade" id="modalRange2" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content bg-dark border-0">
                <div class="modal-body p-0 d-flex align-items-center justify-content-between">
                    <!-- سهم السابق -->
                    <button class="btn text-white fs-1 px-4" onclick="moveImgRange2(-1)" style="z-index: 10; border: none; outline: none;">❮</button>
                    
                    <div class="position-relative w-100 text-center">
                        <button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-3" data-bs-dismiss="modal" style="z-index: 11;"></button>
                        <img src="" id="displayImgRange2" class="img-fluid rounded shadow">
                    </div>

                    <!-- سهم التالي -->
                    <button class="btn text-white fs-1 px-4" onclick="moveImgRange2(1)" style="z-index: 10; border: none; outline: none;">❯</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        const startNum = 128; 
        const endNum = 158;   
        const container = document.getElementById('gallery128to157');
        const displayImg = document.getElementById('displayImgRange2');
        let currentIdx = startNum;

        // 1. إنشاء الصور تلقائياً من 128 إلى 157
        let galleryHTML = '';
        for (let i = startNum; i <= endNum; i++) {
            galleryHTML += `
                <div class="col-6 col-md-3">
                    <img src="${i}.jpeg" class="img-fluid rounded border shadow-sm" 
                         style="cursor:pointer; height:200px; object-fit:cover; width:100%"
                         data-bs-toggle="modal" data-bs-target="#modalRange2" 
                         onclick="window.setImgRange2(${i})">
                </div>`;
        }
        container.innerHTML = galleryHTML;

        // 2. وظيفة التكبير
        window.setImgRange2 = function(n) {
            currentIdx = n;
            displayImg.src = n + ".jpeg";
        };

        // 3. وظيفة الأسهم للتنقل في هذا النطاق
        window.moveImgRange2 = function(step) {
            currentIdx += step;
            if (currentIdx > endNum) currentIdx = startNum;
            if (currentIdx < startNum) currentIdx = endNum;
            displayImg.src = currentIdx + ".jpeg";
        };

        // دعم الكيبورد
        document.addEventListener('keydown', (e) => {
            if (document.querySelector('#modalRange2.show')) {
                if (e.key === "ArrowLeft") moveImgRange2(-1);
                if (e.key === "ArrowRight") moveImgRange2(1);
            }
        });
    })();
</script>
        
        <!-- Modal تكبير الصورة -->
        <div class="modal fade" id="imageModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content">
        <div class="modal-body p-0">
        <img id="modalImage" src="" class="img-fluid w-100">
        </div>
        </div>
        </div>
        </div>
        
        <!-- Bootstrap JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        
        <!-- JavaScript -->
        <script>
        function showImage(src) {
        document.getElementById("modalImage").src = src;
        }
        </script>

</div>
</div>

</body>
